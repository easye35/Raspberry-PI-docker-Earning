<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnBox Dashboard</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ---------------------------------------------------------
         SIDEBAR
    ---------------------------------------------------------- -->
    <div class="sidebar">
        <h2>EarnBox</h2>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Containers</a></li>
            <li><a href="#">System</a></li>
        </ul>
    </div>

    <!-- ---------------------------------------------------------
         MAIN CONTENT
    ---------------------------------------------------------- -->
    <div class="main-content">

        <!-- -----------------------------------------------------
             SYSTEM STATS GRID
        ------------------------------------------------------ -->
        <div class="stats-grid">

            <div class="stat-card">
                <h3>CPU</h3>
                <p id="cpuValue">…</p>
            </div>

            <div class="stat-card">
                <h3>RAM</h3>
                <p id="ramValue">…</p>
            </div>

            <div class="stat-card">
                <h3>Disk</h3>
                <p id="diskValue">…</p>
            </div>

            <div class="stat-card">
                <h3>Network</h3>
                <p id="netValue">RX: …<br>TX: …</p>
            </div>

            <div class="stat-card">
                <h3>Temperature</h3>
                <p id="tempValue">…</p>
            </div>

            <div class="stat-card">
                <h3>Uptime</h3>
                <p id="uptimeBadge">Uptime: …</p>
            </div>

            <div class="stat-card">
                <h3>Reset Service</h3>
                <p id="serviceBadge">Reset Service: …</p>
            </div>

        </div>

        <!-- -----------------------------------------------------
             CONTAINER GRID
        ------------------------------------------------------ -->
        <h2>Containers</h2>
        <div id="containerGrid"></div>

    </div>

    <!-- ---------------------------------------------------------
         LOGS MODAL
    ---------------------------------------------------------- -->
    <div id="logsModal" class="modal">
        <div class="modal-content">

            <h2>Container Logs</h2>

            <pre id="logsContent"></pre>

            <button id="refreshLogs">Refresh</button>
            <button id="closeLogs">Close</button>

        </div>
    </div>

    <!-- ---------------------------------------------------------
         JAVASCRIPT
    ---------------------------------------------------------- -->
    <script src="js/app.js"></script>

</body>
</html>
