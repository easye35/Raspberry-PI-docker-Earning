<!-- CHARTS PAGE (hidden by default) -->
<div id="chartsPage" class="panel" style="display:none;">
    <h2>Charts</h2>
    <p>Live system and earnings charts</p>

    <div class="chart-block">
        <h3>CPU Usage</h3>
        <canvas id="cpuChart" width="600" height="200"></canvas>
    </div>

    <div class="chart-block">
        <h3>RAM Usage</h3>
        <canvas id="ramChart" width="600" height="200"></canvas>
    </div>

    <div class="chart-block">
        <h3>Earnings</h3>
        <canvas id="earningsChart" width="600" height="200"></canvas>
    </div>
</div>
