<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnbox Dashboard</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="brand">Earnbox</span>
            <button id="closeSidebar" class="close-btn"><i class="fas fa-times"></i></button>
        </div>

        <nav class="sidebar-nav">
            <a href="#/dashboard" class="nav-item active"><i class="fas fa-gauge"></i> Dashboard</a>
            <a href="#/containers" class="nav-item"><i class="fas fa-box"></i> Containers</a>
            <a href="#/system" class="nav-item"><i class="fas fa-microchip"></i> System</a>
            <a href="#/power" class="nav-item"><i class="fas fa-bolt"></i> Power</a>
            <a href="#/earnings" class="nav-item"><i class="fas fa-coins"></i> Earnings</a>
            <a href="#/charts" class="nav-item"><i class="fas fa-chart-line"></i> Charts</a>
            <a href="#/settings" class="nav-item"><i class="fas fa-gear"></i> Settings</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main id="main">

        <!-- Header -->
        <header class="header">
            <button id="openSidebar" class="menu-btn"><i class="fas fa-bars"></i></button>
            <h1 id="pageTitle">Dashboard</h1>
            <div class="header-actions">
                <button id="themeToggle" class="theme-btn"><i class="fas fa-circle-half-stroke"></i></button>
            </div>
        </header>

        <!-- Page Container -->
        <section id="content" class="content">
            <!-- Dynamic content injected here -->
        </section>

    </main>

    <!-- JS Modules -->
    <script src="js/app.js"></script>
    <script src="js/system.js"></script>
    <script src="js/containers.js"></script>
    <script src="js/earnings.js"></script>
    <script src="js/charts.js"></script>

</body>
</html>
