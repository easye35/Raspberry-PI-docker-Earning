<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earning Appliance Dashboard</title>

    <!-- Core Styles -->
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="theme.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

</head>
<body>

    <!-- ======= Frosted Glass Sidebar ======= -->
    <aside id="sidebar" class="glass-panel">
        <div class="logo-area">
            <h1 class="logo-text">Earning<br>Appliance</h1>
        </div>

        <nav class="nav-links">
            <button class="nav-btn active" data-target="overview">Overview</button>
            <button class="nav-btn" data-target="services">Services</button>
            <button class="nav-btn" data-target="system">System</button>
            <button class="nav-btn" data-target="network">Network</button>
            <button class="nav-btn" data-target="logs">Logs</button>
        </nav>

        <div class="theme-toggle">
            <span>Theme</span>
            <label class="switch">
                <input type="checkbox" id="themeSwitch">
                <span class="slider"></span>
            </label>
        </div>
    </aside>

    <!-- ======= Main Content ======= -->
    <main id="main-content">

        <!-- ======= Overview Section ======= -->
        <section id="overview" class="page-section active">
            <h2 class="section-title">Overview</h2>

            <div class="card-grid">

                <!-- Animated Stat Cards -->
                <div class="stat-card glass-card" id="total-earnings">
                    <div class="card-title">Total Earnings</div>
                    <div class="card-value glow-text" id="earnings-value">$0.00</div>
                    <div class="card-sub">Across all services</div>
                </div>

                <div class="stat-card glass-card" id="active-services">
                    <div class="card-title">Active Services</div>
                    <div class="card-value glow-text" id="services-value">0</div>
                    <div class="card-sub">Running modules</div>
                </div>

                <div class="stat-card glass-card" id="uptime">
                    <div class="card-title">System Uptime</div>
                    <div class="card-value glow-text" id="uptime-value">--:--:--</div>
                    <div class="card-sub">Live</div>
                </div>

            </div>

            <!-- Live Status Panel -->
            <div class="glass-card wide-card" id="live-status">
                <h3 class="panel-title">Live Status</h3>
                <div id="status-container" class="status-grid">
                    <!-- JS will inject animated service cards here -->
                </div>
            </div>
        </section>

        <!-- ======= Services Section ======= -->
        <section id="services" class="page-section">
            <h2 class="section-title">Services</h2>
            <div id="services-container" class="module-grid">
                <!-- JS modules will populate service cards -->
            </div>
        </section>

        <!-- ======= System Section ======= -->
        <section id="system" class="page-section">
            <h2 class="section-title">System Information</h2>

            <div class="glass-card wide-card">
                <div id="system-info" class="info-grid">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </section>

        <!-- ======= Network Section ======= -->
        <section id="network" class="page-section">
            <h2 class="section-title">Network</h2>

            <div class="glass-card wide-card">
                <div id="network-info" class="info-grid">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </section>

        <!-- ======= Logs Section ======= -->
        <section id="logs" class="page-section">
            <h2 class="section-title">Logs</h2>

            <div class="glass-card wide-card">
                <pre id="logs-output" class="logs-area">Loading logs...</pre>
            </div>
        </section>

    </main>

    <!-- ======= Core JS ======= -->
    <script src="dashboard.js"></script>
</body>
</html>
