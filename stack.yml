version: "3.9"

services:

  honeygain:
    image: honeygain/honeygain
    container_name: honeygain
    restart: unless-stopped
    platform: linux/amd64
    command: >
      -tou-accept
      -email ${HG_EMAIL}
      -pass ${HG_PASSWORD}
      -device raspberrypi
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f honeygain || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  pawns:
    image: iproyal/pawns-cli:latest
    container_name: pawns
    restart: unless-stopped
    platform: linux/amd64
    command: >
      --email ${PAWNS_EMAIL}
      --password ${PAWNS_PASSWORD}
      --device-name raspberrypi
      --accept-tos
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f pawns || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 3600

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    ports:
      - "61208:61208"
    pid: "host"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /dev/disk:/dev/disk:ro
    environment:
      - GLANCES_OPT=-w

  dashboard:
    image: nginx:alpine
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro

  diagnostics:
    image: alpine:latest
    container_name: diagnostics
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./diagnostics-server.sh:/diagnostics-server.sh:ro
    entrypoint: ["/bin/sh", "/diagnostics-server.sh"]

  watchdog:
    image: docker:24-cli-alpine
    container_name: watchdog
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./watchdog.sh:/watchdog.sh:ro
    entrypoint: ["/bin/sh", "/watchdog.sh"]
