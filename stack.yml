version: "3.8"

services:
  earnapp:
    image: fscarmen/earnapp:latest
    platform: linux/amd64
    container_name: earnapp
    restart: always
    environment:
      - EARNAPP_TOKEN=${EARNAPP_TOKEN}

  honeygain:
    image: mktx/honeygain:latest
    container_name: honeygain
    restart: always
    environment:
      - EMAIL=${HG_EMAIL}
      - PASSWORD=${HG_PASSWORD}
      - DEVICE_NAME=pi-honeygain

  pawns:
    image: iproyal/pawns-cli:latest
    container_name: pawns
    restart: always
    environment:
      - PAWNS_EMAIL=${PAWNS_EMAIL}
      - PAWNS_PASSWORD=${PAWNS_PASSWORD}
      - PAWNS_DEVICE_NAME=pi-pawns

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --include-restarting --include-stopped --interval 300
