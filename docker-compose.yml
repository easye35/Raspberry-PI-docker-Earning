version: "3.8"

services:
  honeygain:
    image: honeygain/honeygain
    container_name: honeygain
    restart: unless-stopped
    command: >
      -tou-accept
      -email ${HONEYGAIN_EMAIL}
      -password ${HONEYGAIN_PASSWORD}
      -device ${HONEYGAIN_DEVICE}
    environment:
      - TZ=${TZ}
    networks:
      - earning_net

  pawns:
    image: iproyal/pawns-cli:latest
    container_name: pawns
    restart: unless-stopped
    command: >
      --email=${PAWNS_EMAIL}
      --password=${PAWNS_PASSWORD}
      --device-name=${PAWNS_DEVICE}
      --accept-tos
    environment:
      - TZ=${TZ}
    networks:
      - earning_net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    command: --cleanup --schedule "0 0 4 * * *"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - earning_net

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    pid: "host"
    ports:
      - "61208:61208"
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - earning_net

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - earning_net

  api:
    build: ./api
    container_name: earning-api
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PORT=3001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/earnapp:/etc/earnapp:ro
      - /var/log/earnapp:/var/log/earnapp:ro
    networks:
      - earning_net

networks:
  earning_net:
    driver: bridge
