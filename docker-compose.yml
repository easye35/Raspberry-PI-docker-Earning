version: "3.9"

services:

  # ------------------------------------------------------------
  # PAWNS.APP
  # ------------------------------------------------------------
  pawns:
    image: iproyal/pawns-cli:latest
    container_name: pawns
    restart: always
    env_file:
      - modules/.env
    command: >
      --email ${PAWNS_EMAIL}
      --password ${PAWNS_PASSWORD}
      --device-name ${PAWNS_DEVICE}
    networks:
      - earnbox

  # ------------------------------------------------------------
  # HONEYGAIN
  # ------------------------------------------------------------
  honeygain:
    image: honeygain/honeygain:latest
    container_name: honeygain
    restart: always
    env_file:
      - modules/.env
    command: >
      -tou-accept
      -email ${HONEYGAIN_EMAIL}
      -password ${HONEYGAIN_PASSWORD}
    networks:
      - earnbox

  # ------------------------------------------------------------
  # EARNAPP
  # ------------------------------------------------------------
  earnapp:
    image: earnapp/earnapp:latest
    container_name: earnapp
    restart: always
    env_file:
      - modules/.env
    environment:
      - EARNAPP_EMAIL=${EARNAPP_EMAIL}
      - EARNAPP_PASSWORD=${EARNAPP_PASSWORD}
    networks:
      - earnbox

  # ------------------------------------------------------------
  # EARNBOX BACKEND (server.js)
  # ------------------------------------------------------------
  earnbox-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: earnbox-api
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app/dashboard
      - ./modules:/app/modules
    networks:
      - earnbox

networks:
  earnbox:
    driver: bridge
